services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexus-redis-pass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexus-redis-pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.9
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nexus-ch-pass}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma db push --skip-generate && npm run db:seed"]
    environment:
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4400:4400"
    environment:
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus-redis-pass}@redis:6379
      - USE_BATCH_INDEXER=1
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  ws:
    build:
      context: ./ws-server
    ports:
      - "4401:4401"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus-redis-pass}@redis:6379
      - WS_PORT=4401
      - NEXUS_API_KEYS=${NEXUS_API_KEYS:-}
    depends_on:
      redis:
        condition: service_healthy

  indexer:
    build:
      context: ./indexer
    environment:
      - DATABASE_URL=postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus-redis-pass}@redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-nexus-ch-pass}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HEALTH_PORT=4409
      - USE_BATCH_INDEXER=1
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
